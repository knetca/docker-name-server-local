# 00-seed.conf — placeholder zone file
# Baked into dns-manager image. Copied to zones volume on first start only,
# if no zone files are present. Replaced by deploy-zones.sh on first
# successful git sync.
#
# Contains no real records — exists only to satisfy Unbound's include glob
# so startup does not fail on an empty zones volume.
#
# The health check record is authoritative here until the real zone file
# arrives; it is also defined in 10-server.conf so there is no gap.
