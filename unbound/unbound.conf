# unbound.conf — base configuration for docker-dns stack
#
# klutchell/unbound expects custom config in /etc/unbound/custom.conf.d/.
# This file overrides the image default to also include the zones volume,
# which is written at runtime by dns-manager.
#
# Include order matters — server: directives before forward-zone: blocks.

server:
    include: "/etc/unbound/custom.conf.d/10-server.conf"
    include: "/etc/unbound/zones/*.conf"

include: "/etc/unbound/custom.conf.d/50-forward-zones.conf"
