# unbound.conf — base configuration for docker-name-server
#
# The following line includes additional configuration files from the
# /etc/unbound/unbound.conf.d directory.
#
# Do not edit this file for host-specific changes — it is tracked in git
# and changes will be overwritten on git pull.
# Add overrides to unbound/custom.conf.d/local.conf instead.
include-toplevel: "/etc/unbound/unbound.conf.d/*.conf"
include-toplevel: "/etc/unbound/custom.conf.d/*.conf"

# Files in /etc/unbound/zones/*.conf are managed by dns-manager and include
# local zones and OISD blocklist. Use 30-allowed.conf for blocklist overrides.
include-toplevel: "/etc/unbound/zones/*.conf"