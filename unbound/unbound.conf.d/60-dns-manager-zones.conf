# 60-dns-manager-zones.conf — local zones and OISD blocklist
#
# Files in /etc/unbound/zones/*.conf are managed by dns-manager.
#
# Local zones are loaded via the ${ZONES_REPO} git repo and periodically
# pulled and applied if changes were found.
#
# OISD blocklist (20-blocklist.conf) adds ad/tracker blocking at the resolver
# level — complementary, not redundant. An allow list (30-allowed.conf),
# included via ${ZONES_REPO}, supports blocklist overrides for false positives.
server:
    include: "/etc/unbound/zones/*.conf"
