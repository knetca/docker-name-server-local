# 10-server.conf — server directives, access control, hardening
# Adapted from dns-cstl LXC build for Docker deployment.

server:
    interface: 0.0.0.0
    interface: ::0
    port: 53
    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    # Access control — default deny, permit homelab subnets and Tailscale pool
    access-control: 0.0.0.0/0 refuse
    access-control: ::0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: ::1/128 allow
    access-control: 192.168.0.0/16 allow
    access-control: 100.124.224.0/21 allow

    do-not-query-localhost: no

    # TLS bundle for DoT upstream verification
    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"

    # Identity hardening
    hide-version: yes
    hide-identity: yes
    identity: ""

    # DNS rebinding protection
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 100.64.0.0/10
    private-address: fd00::/8
    private-address: fe80::/10

    # Performance
    num-threads: 2
    so-reuseport: yes
    msg-cache-size: 64m
    rrset-cache-size: 128m
    cache-min-ttl: 300
    cache-max-ttl: 86400
    prefetch: yes
    prefetch-key: yes

    # Hardening
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-algo-downgrade: yes
    harden-large-queries: yes
    harden-short-bufsize: yes
    use-caps-for-id: yes
    qname-minimisation: yes
    aggressive-nsec: yes

    # Logging — stderr, captured by Docker
    verbosity: 1
    log-queries: no
    log-replies: no
    logfile: ""
    use-syslog: no

    # Health check record — used by Docker healthcheck
    local-zone: "health.check.unbound." static
    local-data: "health.check.unbound. IN A 127.0.0.1"

# Control interface — no TLS, loopback only.
# dns-manager reaches this at 127.0.0.1:8953 via host networking.
# Acceptable on a dedicated single-purpose host.
remote-control:
    control-enable: yes
    control-interface: 127.0.0.1
    control-port: 8953
    control-use-cert: no
