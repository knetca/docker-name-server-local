# 50-forward-zones.conf — DoT upstream resolvers (filtered malware tiers)
#
# Upstream selection rationale:
#   CIRA Canadian Shield  — Canadian operator, malware+phishing filtering,
#                           no US jurisdiction, strong privacy policy
#   Quad9                 — Swiss non-profit, malware+phishing filtering,
#                           no logging policy
#   Cloudflare filtered   — 1.1.1.2 security tier, malware+phishing filtering
#
# All upstreams use DNS over TLS (port 853) — ISP cannot observe query content.
#
# Do not edit this file for host-specific changes — it is tracked in git
# and changes will be overwritten on git pull.
# Add overrides to unbound/custom.conf.d/local.conf instead.
forward-zone:
    name: "."
    forward-tls-upstream: yes

    # CIRA Canadian Shield — protected tier
    forward-addr: 149.112.121.10@853#protected.canadianshield.cira.ca
    forward-addr: 149.112.122.10@853#protected.canadianshield.cira.ca

    # Quad9 — filtered tier
    forward-addr: 9.9.9.9@853#dns.quad9.net
    forward-addr: 149.112.112.112@853#dns.quad9.net

    # Cloudflare — security tier (1.1.1.2)
    forward-addr: 1.1.1.2@853#security.cloudflare-dns.com
    forward-addr: 1.0.0.2@853#security.cloudflare-dns.com
