# 20-access-control.conf — access control
#
# Default permits loopback and all RFC1918 private address space.
#
# Do not edit this file for host-specific changes — it is tracked in git
# and changes will be overwritten on git pull.
# Add overrides to unbound/custom.conf.d/local.conf instead.
server:
    # Default deny
    access-control: 0.0.0.0/0 refuse
    access-control: ::0/0 refuse

    # Loopback
    access-control: 127.0.0.0/8 allow
    access-control: ::1/128 allow

    # RFC1918 private address space
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
