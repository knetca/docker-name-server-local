# chrony.conf — NTP server for docker-name-server stack
#
# The -x flag passed via Dockerfile CMD disables system clock adjustment.
# Container tracks upstream sources and serves NTP clients without
# touching the host clock.
#
# Do not edit this file for host-specific changes — it is tracked in git and
# changes will be overwritten on git pull.
# Add overrides chrony/chrony.conf.d/local.conf instead.

# Primary — public NTP sources (replace or supplement in chrony.conf.d/)
pool 0.pool.ntp.org iburst
pool 1.pool.ntp.org iburst
pool 2.pool.ntp.org iburst
pool 3.pool.ntp.org iburst

driftfile /var/lib/chrony/chrony.drift

log tracking measurements statistics
logdir /var/log/chrony

cmdallow 127.0.0.1

include /etc/chrony/chrony.conf.d/*.conf
