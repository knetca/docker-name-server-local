# chrony.conf — NTP server for docker-dns stack
#
# ENABLE_SYSCLK: false in compose disables system clock adjustment.
# Equivalent to chronyd -x in the LXC build. Container tracks upstream
# sources and serves NTP to LAN clients without touching the host clock.
#
# Nameservers become stratum 3. Homelab clients become stratum 4.

# Primary — NRC Canada cesium-traceable sources
server time.nrc.ca iburst prefer
server time.chu.nrc.ca iburst

# Fallback — Canadian pool
pool 0.ca.pool.ntp.org iburst
pool 1.ca.pool.ntp.org iburst

driftfile /var/lib/chrony/chrony.drift

# Serve homelab RFC1918 subnets — Fortigate is the enforcement layer
allow 192.168.0.0/16

log tracking measurements statistics
logdir /var/log/chrony

cmdallow 127.0.0.1
